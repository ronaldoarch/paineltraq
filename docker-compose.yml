version: '3.8'

services:
  # ============================================
  # APLICAÇÃO PRINCIPAL
  # ============================================
  app:
    build: .
    container_name: bearbet-tracker
    restart: always
    env_file: .env
    environment:
      TRUST_PROXY: ${TRUST_PROXY:-true}
      # Obrigatório na rede Docker (Coolify às vezes injeta DB_HOST=localhost no .env)
      DB_HOST: postgres
      REDIS_HOST: redis
    # Sem publicar 3001 no host: evita "address already in use" no Coolify e em
    # servidores com várias stacks. O Nginx acessa app:3001 na rede interna.
    # Acesso externo: no Coolify o proxy fala com app/nginx na rede Docker (sem porta no host).
    # Na VPS: use também -f docker-compose.vps.yml para publicar 80/443. Debug: docker compose exec app wget -qO- http://127.0.0.1:3001/api/health
    expose:
      - "3001"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./logs:/app/logs
    networks:
      - bearbet-network
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "5"

  # ============================================
  # BANCO DE DADOS
  # ============================================
  postgres:
    image: postgres:16-alpine
    container_name: bearbet-postgres
    restart: always
    environment:
      POSTGRES_DB: ${DB_NAME:-bearbet_tracker}
      POSTGRES_USER: ${DB_USER:-bearbet}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-TROQUE_POR_UMA_SENHA_FORTE_AQUI}
    expose:
      - "5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-bearbet} -d ${DB_NAME:-bearbet_tracker}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - bearbet-network

  # ============================================
  # REDIS (FILAS)
  # ============================================
  redis:
    image: redis:7-alpine
    container_name: bearbet-redis
    restart: always
    expose:
      - "6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    networks:
      - bearbet-network

  # ============================================
  # NGINX (REVERSE PROXY + SSL)
  # ============================================
  nginx:
    build:
      context: ./nginx
      dockerfile: Dockerfile
    image: bearbet-nginx:local
    container_name: bearbet-nginx
    restart: always
    # Sem "ports" no host: Coolify/Traefik encosta na rede do projeto (80/8080 do host costumam estar ocupados).
    # Na VPS com acesso direto às portas: docker compose -f docker-compose.yml -f docker-compose.vps.yml up -d
    expose:
      - "80"
      - "443"
    volumes:
      # Certificados e ACME (nginx.conf já está na imagem — não montar arquivo no host)
      - ./nginx/ssl:/etc/nginx/ssl:ro
      - certbot_data:/var/www/certbot:ro
    depends_on:
      - app
    networks:
      - bearbet-network

  # ============================================
  # CERTBOT (SSL AUTOMÁTICO)
  # ============================================
  certbot:
    image: certbot/certbot
    container_name: bearbet-certbot
    volumes:
      - ./nginx/ssl:/etc/letsencrypt
      - certbot_data:/var/www/certbot
    entrypoint: "/bin/sh -c 'trap exit TERM; while :; do certbot renew; sleep 12h & wait $${!}; done;'"

volumes:
  postgres_data:
    name: bearbet_postgres_data
  redis_data:
    name: bearbet_redis_data
  certbot_data:
    name: bearbet_certbot_data

networks:
  bearbet-network:
    name: bearbet-network
    driver: bridge
