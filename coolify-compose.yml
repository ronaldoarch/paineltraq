# Stack pronta para Coolify (SSL e proxy pelo Coolify — sem Nginx/Certbot aqui).
# No Coolify: novo recurso → Docker Compose → aponte para este arquivo.
# Defina DB_PASSWORD, JWT_SECRET e (no 1º deploy) RUN_SEED=true nas variáveis de ambiente.

version: "3.8"

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      NODE_ENV: production
      TRUST_PROXY: "true"
      PORT: "3000"
      DB_HOST: postgres
      DB_PORT: "5432"
      DB_NAME: ${DB_NAME:-bearbet_tracker}
      DB_USER: ${DB_USER:-bearbet}
      DB_PASSWORD: ${DB_PASSWORD}
      REDIS_HOST: redis
      REDIS_PORT: "6379"
      JWT_SECRET: ${JWT_SECRET:?Defina JWT_SECRET nas variaveis de ambiente do Coolify}
      META_PIXEL_ID: ${META_PIXEL_ID:-}
      META_ACCESS_TOKEN: ${META_ACCESS_TOKEN:-}
      META_API_VERSION: ${META_API_VERSION:-v19.0}
      META_TEST_EVENT_CODE: ${META_TEST_EVENT_CODE:-}
      BASE_URL: ${BASE_URL:-https://localhost}
      DEBUG_MODE: ${DEBUG_MODE:-false}
      RUN_SEED: ${RUN_SEED:-false}
      HTTP_KEEPALIVE_TIMEOUT_MS: ${HTTP_KEEPALIVE_TIMEOUT_MS:-190000}
      HTTP_HEADERS_TIMEOUT_MS: ${HTTP_HEADERS_TIMEOUT_MS:-195000}
      HTTP_SERVER_SOCKET_TIMEOUT_MS: ${HTTP_SERVER_SOCKET_TIMEOUT_MS:-240000}
      HTTP_REQUEST_TIMEOUT_MS: ${HTTP_REQUEST_TIMEOUT_MS:-180000}
      DB_CONNECTION_TIMEOUT_MS: ${DB_CONNECTION_TIMEOUT_MS:-20000}
      REDIS_CONNECT_TIMEOUT_MS: ${REDIS_CONNECT_TIMEOUT_MS:-12000}
      # Cache GET /api/stats (ms) — menos consultas pesadas → menos 504 no Traefik (~60s)
      STATS_CACHE_TTL_MS: ${STATS_CACHE_TTL_MS:-30000}
      # Limite máximo de duração de uma query no banco (evita travamentos que causam 504)
      DB_STATEMENT_TIMEOUT_MS: ${DB_STATEMENT_TIMEOUT_MS:-25000}
      # Coolify/Traefik: rota pública → porta 3000 do container (app não ouve em 80).
      SERVICE_URL_APP_3000: "${SERVICE_URL_APP_3000:-}"
      SERVICE_FQDN_APP_3000: "${SERVICE_FQDN_APP_3000:-}"
    # Sem "ports" no host: no Coolify o Traefik fala com o container só pela rede Docker.
    # Publicar 3000:3000 no host costuma ser desnecessário e pode conflitar com outras stacks.
    expose:
      - "3000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "require('http').get('http://127.0.0.1:'+(process.env.PORT||'3000')+'/api/health/live',(r)=>{r.resume();r.on('end',()=>process.exit(r.statusCode===200?0:1));}).on('error',()=>process.exit(1))",
        ]
      interval: 20s
      timeout: 5s
      retries: 5
      start_period: 120s

  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_NAME:-bearbet_tracker}
      POSTGRES_USER: ${DB_USER:-bearbet}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 5s
      retries: 12

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
  redis_data:
